      - { pair: "dark #383838 on yellow #FFDE00", ratio: 8.77, wcag_aa: true, wcag_aaa: true }
    a11y_assessment: "STRONG — primary text combinations all hit AAA. Sky blue and gray-text only used decoratively where legibility isn't critical. Focus states are highly visible and on-brand."

# Detailed animation states (from interactive probing + CSS rules)
animations:
  primary_cta:
    type: "button"
    description: "Brutalist content-translate hover — inner element shifts 7px right + 7px up, exposing the static offset shadow"
    transition: "0.4s ease-out"
    states:
      default:
        background: "#6FC2FF"
        boxShadow: "none (shadow lives on a sibling/pseudo)"
        transform: "translate(0, 0) on inner #styled-button-component"
      hover:
        background: "#6FC2FF"
        boxShadow: "shadow stays, but content lifts off it"
        transform: "translate(7px, -7px) on inner #styled-button-component"
  text_input:
    type: "input"
    description: "Sky-blue offset shadow appears on focus (the 'brutalist focus ring')"
    transition: "box-shadow 0.15s"
    states:
      default:
        backgroundColor: "#FFFFFF"
        borderColor: "#383838"
        borderWidth: "2px"
        boxShadow: "none"
      focus:
        backgroundColor: "#FFFFFF"
        borderColor: "#383838"
        borderWidth: "2px"
        boxShadow: "rgba(111, 194, 255, 0.925) -2.77px 2.77px 0 0"
  newsletter_input:
    type: "input"
    description: "Border color shifts to saturated blue on hover and focus"
    transition: "0.2s ease-in-out"
    states:
      default:
        backgroundColor: "rgba(248, 248, 247, 0.7)"
        borderColor: "#383838"
      hover:
        borderColor: "#2BA5FF"
      focus:
        borderColor: "#2BA5FF"
  featured_card:
    type: "card"
    description: "Card scales to 1.1 and the H3 background fills with accent color (yellow / mint / sky-blue depending on category)"
    transition: "0.4s ease-out"
    states:
      default:
        transform: "scale(1)"
        h3_background: "transparent"
      hover:
        transform: "scale(1.1)"
        opacity: "1 !important"
        h3_background: "#FFDE00 (or #53DBC9 community / #6FC2FF product) — color codes the category"
        h3_color: "#383838"
  popout_card:
    type: "card-grid-tile"
    description: "Desktop ≥1302px only — card breaks out of grid, gets 4px border, 36px radius, 1.15 scale"
    states:
      default:
        position: "static"
        borderWidth: "2px"
        borderRadius: "0px"
        transform: "scale(1)"
      hover:
        position: "absolute"
        borderWidth: "4px"
        borderRadius: "36px"
        transform: "scale(1.15)"
        offset_top: "-20px (some variants)"
  inline_link:
    type: "text-link"
    description: "Underline grows from baseline in sky-blue"
    transition: "border-bottom 0.2s ease-in-out"
    states:
      default:
        borderBottom: "0px solid transparent"
      hover:
        borderBottom: "calc(0.09em + 1px) solid #6FC2FF"
        marginBottom: "0px"
  active_tab:
    type: "tab-button"
    description: "Selected tab shows yellow offset shadow"
    states:
      inactive:
        boxShadow: "none"
      active:
        boxShadow: "#FFDE00 -6px 6px 0 0"
  scroll_reveal:
    type: "section-content"
    description: "Default entrance — translateY 1rem + opacity 0 → 0"
    keyframe: "hCmOrq"
    duration: "0.4-1s"
    states:
      offscreen:
        transform: "translateY(1rem)"
        opacity: 0
      onscreen:
        transform: "translateY(0)"
        opacity: 1

