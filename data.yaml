psychology:
  style_classification: "Neo-Brutalist Editorial"
  # Brutalist DNA (chunky 2-3px borders, hard offset shadows, monospace display type,
  # zero/tiny radii) softened with warm cream backgrounds, saturated playful accents,
  # tilted "stickers", and hand-drawn doodle illustrations.

  brand_personality: ["bold", "technical", "playful", "creative"]

  emotions_evoked:
    - emotion: "Confidence"
      reason: "Heavyweight monospace headlines + thick black borders feel decisive and engineering-grade"
    - emotion: "Warmth"
      reason: "Cream beige (#F4EFEA) base instead of sterile white, plus the duck mascot, lower the formality"
    - emotion: "Energy"
      reason: "Saturated yellow / sky blue / coral blocks announce sections like editorial pull-quotes"
    - emotion: "Insider trust"
      reason: "Terminal/code aesthetic (Aeonik Mono everywhere) signals 'built by data engineers, for data engineers'"

  target_audience:
    primary:
      description: "Data engineers, analytics engineers, and senior data scientists evaluating modern cloud warehouses"
      age_range: "25-45"
      tech_savvy: "very high"
      psychographic: "DuckDB-curious, frustrated with Snowflake/BigQuery cost+ceremony, values speed and serverless ergonomics"
    secondary:
      description: "Engineering leaders, founders, and AI/LLM application teams needing a queryable analytical store"
      age_range: "30-50"
      tech_savvy: "high"

  visual_principles:
    - name: "Brutalist contrast"
      description: "Hard 2-3px charcoal borders + offset solid-color drop shadows (-6px 6px 0 0) on every important surface"
    - name: "Monospace as voice"
      description: "Aeonik Mono is used at display sizes (56px H1) — type itself becomes the brand's tone (technical, terminal-native)"
    - name: "Editorial color blocking"
      description: "Sections alternate cream → yellow → sky-blue full-bleed bands, like a printed magazine spread"
    - name: "Playful interruptions"
      description: "Tilted 'sticker' CTAs, hand-drawn doodles (clouds, ducks, arrows), wiggly lines break the rigor"
    - name: "Generous whitespace"
      description: "40px is the dominant padding unit — hero and sections breathe despite the dense styling"

  why_it_works:
    - "Differentiation in a sea of glassmorphic SaaS dashboards — instantly recognizable as MotherDuck"
    - "Monospace headline reinforces 'built by infra people' positioning vs Snowflake's corporate gloss"
    - "Hard offset shadows give every CTA tactile affordance without using fake 3D gradients"
    - "Cream background reduces eye fatigue on long marketing pages while keeping AAA contrast for body text"
    - "Charming mascot (duck) + editorial doodles humanize a deeply technical product (cloud OLAP)"

  design_philosophy:
    core_belief: "Infrastructure software can be opinionated, expressive, and joyful — not just enterprise-gray"
    key_principles:
      - "Type does the work — pick a strong monospace and let it carry the brand"
      - "Borders over shadows — 2-3px outlines beat soft drop shadows for hierarchy"
      - "Color in blocks, not gradients — flat saturated panels signal sections"
      - "Playfulness as trust — a confident product can afford to be charming"

